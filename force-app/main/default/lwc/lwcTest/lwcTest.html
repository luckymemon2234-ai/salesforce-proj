<template>
    <lightning-card title=" Lightning Datatable in LWC">
        <template if:true={data}>
            <lightning-datatable key-field="id" 
                                 data={data} 
                                 columns={columns} 
                                 onrowaction={handleRowActions}
                                 onsave={handleSave}
                                 
                                 hide-checkbox-column 
                                 show-row-number-column>
            </lightning-datatable>
        </template>
    </lightning-card>
